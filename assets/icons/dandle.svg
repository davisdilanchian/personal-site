<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b2f8f"/>
      <stop offset="1" stop-color="#171033"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#dg)"/>
  <!-- isometric stacked letter tiles -->
  <g stroke="#fff" stroke-width="2.4" stroke-linejoin="round" fill="none" opacity="0.95">
    <!-- bottom tile -->
    <path d="M28 60 L50 72 L72 60 L50 48 Z" fill="#ffffff" fill-opacity="0.08"/>
    <path d="M28 60 L28 50 L50 62 L50 72 Z" fill="#ffffff" fill-opacity="0.04"/>
    <path d="M72 60 L72 50 L50 62 L50 72 Z" fill="#ffffff" fill-opacity="0.12"/>
    <!-- top tile -->
    <path d="M34 40 L50 49 L66 40 L50 31 Z" fill="#ffffff" fill-opacity="0.14"/>
  </g>
  <text x="50" y="45" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">D</text>
</svg>
